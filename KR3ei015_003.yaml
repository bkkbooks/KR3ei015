body:
  text: 卷三調經種子婦人之病多是月候衍期或前或後或多或少小腹急痛每至經脈行時頭眩飲食減少氣滿崩漏不止腰腿疼腫赤白帶下並宜調理主方川芎七分血藥中能使氣化流行以養心血取其辛溫能行血之滯也當歸一錢大能和血補血諸血症皆宜全之白芍八分治血虛腹痛之劑也主收斂腹中疼痛酒浸煨用生地一錢能涼心血疏血或衄血吐血凝滯瘀血崩中血不止胎動下血大腸結燥大便不潤者皆當用之香附八分氣重味輕而辛散婦人之聖藥也蓋婦人心性偏執每多鬱滯所謂多氣少血此也此藥能疏氣散瘀益母草一錢取其活血養血也甘草三分能和藥性牡丹皮七分治腸胃積血除結氣破瘀血吐血衄血之聖藥及無汗骨蒸者其能養真血而去敗血固真氣而行滯氣耳五靈脂一錢逐瘀血腳膝痛不可忍者炒令煙盡為末白茯苓八分潤其肺生津補脾雖曰淡滲而其味尚甘其陰虛者無害也每劑水二盅生薑三片棗一枚煎八分空心溫服加減法經水不及期先來者血熱也加酒炒黃連七分過期紫黑有塊亦血熱也更加黃連過期而行者血寒也加煨乾薑肉桂各三分臨期正行作痛加玄胡八分青皮五分經行或斷續不來積塊刺痛加紅花蘇木桃仁各五分經水來過多加黃芩炒一錢蒲黃八分經水來即病飲食少思加白朮八分陳皮砂仁各五分肥人痰多赤白帶下加南星八分蒼朮八分氣血虛弱四肢痠軟面無顏色加人參黃耆各五分月信趕前宜用涼藥以清熱退後為虛宜用溫藥以補虛分而為二當審而用之但服養血益血補養脾胃諸藥而血自行矣主方白芍一錢酒炒瀉脾經之火伐肝木當歸一錢酒洗能補婦人諸血不足白朮一錢陳壁土炒大能除濕痰故脾胃能補而清順氣得之而能健也與當歸白芍同即清脾則濕熱能消半夏七分薑湯泡性躁而能除濕痰故脾胃得之而能健也白茯苓八分去皮滲利治痰嗽去胞中之火人參七分入肺經助肺氣而通經活血此乃氣中之血藥也甘草三分除頭熱肌熱之聖藥阿膠一錢蛤粉炒成珠保肺經養肝血補虛止嗽血症皆用之五味子五分酸苦而微帶辛能引酸苦入肺腎以收斂肺氣而滋腎水其止嗽益氣除煩補虛生津止渴柴胡八分去蘆瀉肝膽之火川椒三分補暖下焦每帖水二盅姜三片煎食前稍熱服加減法五心煩熱日晡潮熱加胡黃連五分不思飲食加神麯麥芽各二分頭痛加川芎七分通經散治婦人月經不通或積瘀血時常作腹痛攻刺小腹堅硬有塊及室女經不通此藥能通利之劉寄奴二兩當歸尾一兩辰砂三錢另研赤芍一兩紅花一兩穿山甲一兩炒玄胡索一兩莪朮一兩醋炒官桂三錢烏藥一兩牡丹皮一兩酒洗川牛膝一兩酒洗去蘆三稜一兩醋炒共為細末每服二錢空心熱酒調下如不用酒薄荷湯和醋送下亦可此方善能通經用之於血滯者可矣若畏而不服養病自貽患也然多服亦未見有誤養榮湯瘦怯婦人不能孕育者以子宮血少也可用此湯以補陰血不足能養血滋陰血足自然易孕川芎一兩當歸身二兩酒洗白芍二兩酒炒淮熟地四兩洗淨蒸山藥二兩澤瀉一兩五錢去毛山萸肉二兩去核牡丹皮二兩去骨洗淨白茯苓二兩去皮黃柏四兩酒炒褐色知母二兩去毛酒炒共為細末煉蜜丸如梧桐子大每服八十丸空心鹽湯下冬月溫酒下加味調經丸血熱經水先期氣旺痰火者服此藥易孕香附子五斤分作五分一分用鹽水浸一分童便浸一分醋浸一分無灰酒浸一分米泔水浸每分浸法春浸三日夏浸二日秋浸五日冬浸七日仍用原汁煮不可犯鐵器用蔥五斤取白切細拌香附焙乾以蔥黃色為度川芎二兩當歸四兩酒洗白芍四兩生地四兩黃連黃芩各三兩橘紅二兩青皮一兩五錢柴胡二兩白芷二兩五錢荊芥五兩活石五兩水飛過共為末醋面打糊丸如梧桐子大每服八十丸空心白滾湯下烏雞丸治婦人羸瘦弱甚血虛有熱經水不調赤白帶下等症女科切要之藥服之多子醫家不審氣血冷熱妄投膠艾薑桂香燥之藥令人有子殊不知積濕成熱服者無不被禍縱受孕而墜者多矣然世俗概用濟陰暖宮聚寶丹艾附等丸以為得當前藥品乃溫熱之藥助火消陰之劑必致誤人矣故參出此方懷孕時自宜斟酌若素有墜胎之患亦宜禁忌惱怒及姜蒜熱物之類宜戒之此藥性平和滋養血氣安胎保全月事白毛烏骨公雞一隻肥重者閉死去毛腸淨用京酒和水與雞放在罐內浸沒雞兩寸深將文武火煮乾去骨將肉搗爛作餅瓦上焙乾研為細末香附子六兩同米泔水京酒同浸春秋浸三日夏浸一日冬浸四日取火焙之熟地三兩當歸三兩酒洗川芎二兩白芍二兩酒炒人參白朮黃耆白茯苓川續斷砂仁杜仲薑製炒去絲一兩川牛膝一兩五錢去蘆酒洗肥知母二兩酒炒鹿角膠二兩上共為細末再用山藥八兩為末酒打糊為丸將鹿角膠用酒溶化入藥同搗丸如梧桐子大每服六十丸漸加至八九十丸早晨溫酒送下或米湯亦可忌煎炒辛辣之物及莧菜求嗣經驗育胎丸紫河車一具初生男胎為妙連帶者更佳以米泔水洗淨新瓦上烘乾為末丹雄雞腎八副味甘溫無毒暖婦人血海鬢甲未毛童雞為佳煮熟取腎益母草一斤研細末三兩味辛氣溫調經水產後胎前諸疾活血養血蓮子去心二兩主補五臟益元氣安精神開心養血淮熟地六錢主治女子傷中胞胎補五臟血氣不足通血脈益氣力白茯苓三錢去皮主開胸膈調臟氣養心血神守中山茱萸三錢去核主溫中下氣強益精安五臟通九竅暖腰膝共為細末擇壬子日煉蜜丸龍眼大待經事至空心服二丸用蠟酒送下連服三日又候經盡如前服之以受孕見效為度有孕不可服忌煎炒椒薑蔥辣之物此藥平氣血補暖子宮血海之功極大故易孕也虛損補中湯婦人調經胎前產後崩漏虛損諸症川芎當歸酒洗白芍酒拌炒各一兩白朮米泔水洗一兩五錢人參去蘆黃耆蜜炙去毛不用陳皮各一兩鹿角膠一兩五錢頓化入藥砂仁五錢炒上為末煉蜜為丸如梧桐子大每服八十丸空心滾白湯下熬鹿角膠法用鹿角劈碎米泔水浸四五宿用清水洗淨以新罐盛之罐內水滿為度以罐入鍋內水煮之將罐口固扎勿令泄氣用桑柴煮七日七夜取起濾膠宿將汁以文火煅成膏煮時鍋內若干加之熱水再煮勿用冷水取膠同煎藥用之最取元氣大補氣血四聖丹諸男婦諸虛百損並宜服之紫河車一副洗淨新瓦焙乾為末人乳二兩不拘多少旋取於銀銚或銅銚中漫火熬成膏如飴糖色淨用二兩秋石二兩真者用乳缽盛之取熬成乳同曬乾連秋石四兩為度鹿角膠二兩用陳酒半碗煮滾煅化甘枸杞酒浸灑干取淨末一兩五錢淮山藥隔紙炒淨末一兩五錢白茯苓去皮淨末一兩四錢人參淨末二兩上共合為一處將鹿角膠化開少加蜜拌勻搗千捶為度梧桐子大每服五十丸空心淡鹽湯送下忌蔥蒜蘿蔔辛辣熱物丹參散凡經水不調或前或後或多或少產前胎不安產後惡露不止並皆治之冷熱勞倦腰脊骨節煩痛丹參去蘆為末每服二錢酒調下凡調經胎前產後湯藥中皆可加用之極效金匱丸治婦人之聖藥香附一斤童便酒醋鹽水各制四兩生地一兩酒浸洗加益智仁二兩用酒炒去益智仁不用茯苓四兩去皮砂仁二兩炒去殼白芍四兩火煨當歸四兩童便洗白朮六兩米泔水浸洗淨四兩白薇六兩水洗去蘆淨四兩黃芩酒浸洗淨四兩人參二兩木香六錢忌火川續斷六兩酒洗淨五倍炒阿膠四兩蛤粉炒成珠沒藥六錢上為末法制咀片極細用山藥十二兩搗碎用清水打糊為丸如梧桐子大每日空心滾白湯送下五十丸此藥大能調經除百病如神效此女科之聖藥也還少丹治諸虛百損調榮益衛健脾補胃壯陽滋陰久服令人多子能使白髮還黑皮枯再潤此王道平補之劑功效甚大不能盡述何首烏赤白兩種各一斤竹刀切片用用黑豆拌蒸九曬去豆不用破故脂八兩用井花水浸三宿再用胡桃泥拌透去胡桃泥將故脂研末川牛膝八兩去蘆用黑豆拌蒸曬乾九次為末茯苓赤白兩種各一斤去皮筋研細末井花水飛過去浮者只用沉底者赤用牛乳白用人乳初煮乳滿為度煮透以干為度曬乾用枸杞子曬乾為末八兩菟絲子八兩酒浸三宿加好酒浸透煮曬乾為末天門冬去心曬乾八兩麥門冬去心六兩熟地黃酒洗淨八兩生地黃酒洗六兩當歸身酒洗六兩冬青子酒洗八兩覆盆子酒洗八兩桑椹子八兩旱蓮草取頭末八兩黃柏蜜拌炒二兩肥知母蜜拌炒二兩山萸肉八兩龜板二兩醋油炙虎脛骨二兩酥油炙上各味俱不犯鐵器為末煉蜜為丸如梧桐子大每服空心或食前淡鹽湯或酒送下八九十丸漸加至二百丸服此藥時忌蘿蔔牛肉蔥蒜生冷煎炒等物崩漏論婦人崩漏失血過多由氣血俱虛損傷子宮血海也血氣之行外循經絡內榮臟腑重則為崩輕則為漏而衝任之氣虛不能約制其經血故脾不能統血肝不能藏血忽然血崩暴下此等症候皆由脾胃氣血先損能受補者可救誤用止澀寒涼之劑復傷脾胃生氣使血反不歸經矣主方人參一錢炒白朮一錢白茯苓八分甘草五分炙小薊一錢川芎七分當歸頭一錢酒洗側柏葉一錢炒生地黃一錢酒洗水二盅煎八分食遠服加減法血暈加荊芥六分炒澤蘭葉六分虛汗加黃耆一錢蜜炙棗仁八分去殼炒崩中日久白帶不止加龍骨牡蠣火煅各一錢研末用絲綿裹入藥同煎血來多不止加墨棕刷燒灰存性綿灰各三分蓋血遇黑即止也經血得熱崩漏不止口苦咽乾小便短少大便燥結加黃連黃芩山梔各五分俱要酒炒血多紫黑如泥凝塊者亦當用之赤白帶論此症營衛滯氣之所成也赤者屬榮白者屬衛乃病之常然其症皆因喜怒憂思素有濕熱傷於榮衛胞絡使濁氣滲入膀胱故流帶下輕則來而不來重則來而無度使腰膝疼痛飲食減常精神短少法當清上實下清濁自分理脾養氣濕熱自解更能薄滋味溫補下元則帶症自除矣主方川芎一錢當歸一錢酒洗白芍一錢酒洗生地酒洗白朮各一錢甘草五分炙蓮子一錢去心白扁豆花七分炒白雞冠花子一錢炒水二盅煎一盅食遠溫服加減法或加葵花五朵更妙即一丈紅也白者治白帶赤者治赤帶瘦人多熱加黃柏黃連香附各五分肥人多濕痰加蒼朮天南星半夏各六分椿樹皮一錢久下加熟地黃一錢山茱萸八分氣虛加人參黃耆各七分赤帶加酒炒黃芩一錢荊芥六分腹痛加乾薑三分安胎論凡婦人氣血兩虛懷孕無所榮養故四肢無力倦怠飲食少思或平昔素有墜胎之患蓋養胎者血也護胎者氣也保胎安孕者宜清熱也懷孕如懸鐘在梁梁軟則鍾墜故安胎者必補氣血固中氣為主又能養性情戒暴怒則無墜胎之患矣主方人參五分黃耆七分當歸七分川芎五分白芍六分熟地一錢黃芩七分白朮一錢甘草五分炙阿膠一錢蛤粉炒杜仲六分去粗皮炒去絲止腰腹痛用水兩盅煎一盅食遠微熱服月月數帖服之為妙或加艾葉加減法腹痛加砂仁五分取其止痛行氣也憂怒鬱結者加紫蘇香附各五分取其和胎氣也安胎飲胎前宜服清熱養血歸身一錢川芎八分白芍熟地砂仁陳皮各一錢白朮一錢條芩一錢五分紫蘇艾葉各八分甘草四分用水煎服加減法下血不止加蒲黃一錢阿膠一錢炒腹痛加香附枳殼各一錢腰痛加杜仲續斷如胎漏去陳皮甘草加香附亦妙蓋此症屬氣血虛也丹溪安胎丸白朮炒沉水黃芩各二兩為末粥丸如梧桐子大空心服虛人加人參黃耆郁加香附火鬱加梔子八九月後宜服達生散金匱當歸丸孕婦宜常服川芎當歸酒洗白芍酒炒黃芩各四兩納醋炒二兩白朮麩炒阿膠炒人參各二兩砂仁一兩共為末麵糊為丸如梧桐子大每服六七十丸空心用滾水或米飲湯送下此方養血清熱藥也瘦人血少有熱胎動不安素有半產者宜預服之以清其源而後無患矣婦人有孕則礙脾運化而生濕濕而生熱古人用白朮黃芩為安胎之聖藥蓋白朮補脾燥濕黃芩清熱也況胎孕賴血氣以養此方加川芎當歸白芍阿膠以補血再加人參砂仁以安胎順氣止腹痛尤為佳也服此方之後尤為易產所生男女兼無胎毒痘疹稀少無病易育屢服屢驗產後論夫產後憂驚倦勞血氣暴虛諸症乘虛易襲如有氣毋專耗散有食毋專消導熱不可用芩連寒不可用桂附寒則血塊停滯熱則新血流崩至若中虛外感見三陽表症之多似可汗也在產後而用麻黃劑則重竭其陽見三陰里症之多似宜下也在產後而用承氣則重亡其陰血耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗出乃元弱似邪之症毋同胃實厥由陽氣之衰難分寒熱非大補不能回陽而起弱痙因陰血之虧非滋榮不能舒筋而活絡又如乍寒乍熱發作有期症類瘧也若將瘧治遷延難愈神不守舍言語無倫病似邪也若以邪論危凶可待去血多而大便燥結蓯蓉加於生化湯非潤腸承氣能通汗多而小便短澀六君倍用參耆生津助液之可利加參生化頻服救產後之厄長生活命屢用蘇絕谷之人㿗疝脫肛多是氣虛下陷須補中益氣之方口噤拳攣乃因血燥類風用加參生化湯若產戶入風而痛甚服用羌獨養榮之方玉門傷冷而不閉洗須床菟萸硫黃怔忡驚悸生化湯加遠志似邪恍惚安神丸助歸脾因氣而滿悶虛煩生化湯加木香為佐因食而噯酸惡食六君子加神麥為良蘇木稜蓬大能破血青皮枳實最消滿脹一應耗氣破血之劑汗吐宜下之策只可施於少壯豈宜用於胎產大抵新產之後先問惡露何如塊痛未除之人可適加耆朮腹中痛止補中益氣無疑至若陽亡大熱血崩厥暈速煎生化原方乃急救也王太僕云治下補下制以急緩則滋道路而又力微制急方而氣味薄則力與微同故治產當道丹溪先生固本服藥法宜效太僕以加頻凡負生死之奇術須著意以救急欲免俯仰之無愧用存心於愛物此雖未盡產症之詳然所開一症皆緣近鄉治驗為據亦未必無小補云耳產後血塊論凡產後血塊孕乃成余血之所積也夫婦人血旺氣衰二七而天癸至三旬一見以象月盈則虧也行之有恆名曰經有孕則經不行其餘血注於胞中以護胎元然一月名胎胚二月名胎膏三月後始成形而名胎方受母血之陰庇胎形尚小食母血尚有餘計前二月並積於胞日久成塊至產隨兒當下多有產婦送兒送胞勞倦無力或調護欠溫暖致塊痛日久方散慎勿輕用攻血峻劑勿多飲薑椒艾酒若過傷大熱新血未免損失多矣治法須頻服生化湯幾帖以助血液行外用熱衣暖腹凡產後諸症時俗之偏治血塊有用生地紅花以行之蘇木牛膝以攻之治氣有用烏藥香附以順之枳殼厚朴以舒之甚有用青皮枳實蘇子以下氣定喘用芩連梔柏以除熱退煩至若血枯大便實結反用承氣下之而愈結汗多小便短澀反用五苓散通之而愈閉其用偏門罔知固本又有視山楂能攻血塊弱人頻服二三次者此人必死無疑矣生化湯論凡產後氣血暴虛理當大補但惡露未盡用補須知無滯血能化又能生攻塊無損元氣行中又帶補養方思萬全治無一失世以四物湯理產誤人多矣因地黃性寒滯血芍藥酸寒無補正也一產後惡露有塊作痛名曰兒枕世多專先消散然後議補又有消補混方殊不知舊血須當清化新血亦當生養若專主攻舊而新血亦不寧矣世以濟坤丹又名回生丹治產用以攻血塊下胞落胎雖見速效其元氣未免虧損慎毋視為良劑濟坤丹或不得已而用以下胞下胎只可一丸決不可多服今予之生化湯因藥性功效而立名也蓋產後血塊當消新血宜生若專消則心血不寧專生則舊血亦反滯矣考諸藥性惟芎歸桃仁三品藥性善破舊血驟生新血佐以炙黑乾薑甘草引三品入於肺肝生血利氣五味共方則行中有補化中有生實產後聖方因名生化湯凡病起於血氣之衰脾胃之虛而產後血氣脾胃之虛衰尤甚是以丹溪先生論產後必當以大補血氣為先雖有他症以末治之此三言者盡醫產之大旨若能擴充立方用藥則治症可以無大過矣惟醫者詳之生化湯有孕至七八個月照方預製二三帖至胞衣易破速煎一帖候兒下地即服不問正產半產雖少壯產婦平安無恙俱宜服二帖以消血塊生養新血當歸八錢酒洗川芎四錢乾薑五分炙黑存性桃仁十五粒去皮尖甘草五分炙用水二盅煎七分加酒七茶匙稍熱服渣留與後帖渣共煎二帖共煎三次要在一二時辰之內未進飲食之先相繼煎服因下焦惡露而服多服而頻則連化而驟生長新血自免暈症其胎前素弱及產後勞倦又當再製二帖煎服以防昏倦且產婦服一帖漸增精神幾分不厭藥之頻也若照常症今日服一帖明日服一帖豈能扶救將絕之氣血也若虛人見危症及熱症墜胎或勞甚身熱頭痛服藥四五帖稍安未除血痛又當再製服之加參生化湯治產後諸危急症可通用一日一夜必須頻服之三四帖若照常症今日一帖明日一帖豈能接補將絕之氣血救危急之症哉當歸三錢川芎一錢五分乾薑四分炙黑存性甘草三分炙桃仁十五粒去皮尖人參二錢若虛脫冷厥危症汗多加參至三四錢之數用棗水煎服加減法脈脫形色脫將絕症必服此方頻灌救之加參四五錢分娩後血暈血崩症如兼汗多形色脫去宜服此方若無汗不脫者只服生化本方不必加參分娩後血崩形色脫宜服此方又宜頻煎服必加參三四錢分娩後手足冷發厥服此方加參三四錢兼汗亦加參三四錢麥冬一錢左尺脈弱宜加人參若產後汗多加參三四錢汗多渴甚加參三四錢麥冬三錢汗多氣短似喘加參三四錢汗多痰嗽加竹瀝薑汁杏仁二十五粒汗多嗽喘聲聲加杏仁十粒桔梗五分無汗嗽喘氣短者加半夏一錢杏仁十粒桔梗五分汗多身熱氣短加參三四錢汗不止加黃耆一錢產後症治活法凡產後三日內血塊痛人參當緩遇危急加參可救如服此方病勢有生意又當減參再服原方凡產後七日內未曾服生化湯血塊痛未除仍可服生化湯以消塊止痛凡新產及三日內服生化湯二三服痛塊未除仍再服幾帖自然塊消痛止新血長旺精神復舊矣凡產後七日內血塊未除不可加參耆白朮如用之則痛不止而塊難除凡產後或一二日內血塊雖痛未止其產婦氣血虛脫或暈或汗多而厥或形色脫去口氣漸冷或煩渴不止或氣喘急則又無論塊從權多用參耆生化湯以扶危急凡暑月產後照前服生化湯以除痛外用熱衣裳暖腹若失蓋雖服藥其病塊不散凡產後大便或八九日或十日以上不通由血少腸燥故也宜多服生化湯加麻仁以通潤之服川芎當歸至斤數自然通矣虛加人參二三錢慎勿大黃下藥凡產後一二三日內服生化湯三四帖塊覺減其痛可揉按而定者虛也宜服生化湯內加人參三四錢凡產後三日內感傷寒冷物血塊凝結痛甚生化湯內加肉桂五六分至半月一月以上凝塊者宜四消丸及大補湯或補中益氣湯凡產後暈厥脈脫形脫口冷諸危急症從權惟人參可救肥人有痰或暴怒卒中生化湯加竹瀝薑汁
