body:
  text: 卷二脈法左手寸脈洪主胸中之怒氣關脈洪主心中之冷氣尺脈洪主不孤左三指般大主孕有思在內尺脈小如線發主作脈女人血堂病月紅或前或後右手寸脈洪主上焦熱咳嗽有痰身發潮熱關脈洪主冷氣作痛尺脈洪主孕尺脈小主子宮冷兩手六脈一般洪緩而清利主壽高六脈俱小如線大主胃弱不能飲食腰痛頭暈敗血六脈俱洪大浮弦主有風氣女人除此與産後余與男子同男子左手洪右手弱主大利女子右手洪左手弱主大利辨孕男女脈法歌左手實大是男胎右手弦洪是女孩兩尺偏大分男女命門滑實主懷胎調經趕前為熱退後為虛血滯宜破血枯宜補常時與經前作痛為血積經後痛為血虛常時發熱為血虛有積經行發熱為血虛有熱主意婦人坤道血為基氣血調和體最宜血盛氣衰應可治血衰氣旺漸乖違血熱先期風熱紫寒痰黃淡濕違期作痛行經氣血滯行過作痛血氣虛經血有調宗四物濕痰枳術二陳推脈數黃芩荊芥穗氣血力弱入耆參沉遲氣滯檳榔佐作痛滿悶入青皮虛熱逍遙補心類清之經血自如期逍遙散白朮炒川歸柴胡白芍黃芩薄荷地骨皮天花粉龍膽草石蓮子水煎服經閉夫經閉不通者或墜胎及多産傷血或久患潮熱消血或久發盜汗耗血或脾胃不和食少而不生血或痢疾傷風失血或七情傷心氣停鬱結故血閉而不行也治宜生血補血調血主意經凝氣滯不流通故閉將來紫淡紅病後汗多思損血或因濕熱冷兼風氣鬱沉微當利氣緊寒血積又疏通四物檳榔附莪朮桃仁牛膝桂虻蟲弦濡氣虛參白朮黃耆鞭草牡丹芎其間胃火乾枯涸酒佐將軍大有功崩漏皆由勞傷血氣損衝任二脈氣血俱虛不能約制其經血故忽暴下者或漸成淋瀝者蓋婦人皆由心事不定或人事少故貴勢脫先富後貧皆心火上炎治當勸諭而行鎮心火之藥主意崩漏皆由血氣傷脈來弦大細而長東垣下陷不言熱學者須知要忖量丹溪每論虛濕熱陰搏陽弱病之詳脈弦而數當清熱荊芥黃芩未服良百草霜研宗四物痛入延胡炒黑姜脈濡氣虛參白朮續斷黃耆功效強久崩下陷宜升舉養血調脾瀉二陽赤白帶赤屬血白屬氣濕熱為病漏與帶俱是胃中痰積下流滲入膀胱稠黏者是又有如白湯者名曰白濁主燥濕為先法當升之甚者法以提其氣宜斷厚味主意白帶根因濕熱當赤榮白衛不調和來而腰膝皆痠痛漏下時多骨木枯脈來弦緩傷乎風炒姜散服絶其疴伏龍肝散多靈驗脈數樗根效更多伏龍肝散伏龍肝艾葉川芎各一錢五分赤石脂煅麥冬去心乾薑炙川歸肉桂甘草熟地各三分加棗煎服或為末米飲酒下安胎胎氣宜清不宜熱宜靜不宜動有因胎病不安者有因母病而胎不安者宜預安之主意妊婦全憑氣血諧傷情冷熱挫為災傷血脈濡宜四物四君脈大旋安排挫氣縮砂為末服術芎芩歸不傷胎安胎飲熟地白朮炒當歸酒洗川芎白芍茯苓黃芩甘草阿膠炒地榆艾葉各五分姜三片水煎服胎氣鬱滯者宜參蘇飲人參二錢蘇葉五錢水煎服脾氣虛弱者宜六君子湯人參甘草各五錢白朮炒茯苓各一錢半夏制陳皮去白七分加紫蘇枳殼姜二片棗二枚水煎不拘時服鬱結傷脾者宜歸脾湯人參黃耆茯神甘草木香忌火酸棗仁炒白朮炒圓眼肉加柴胡梔仁炒黑各等分姜一片水煎服鬱怒肝脾者宜四七湯蘇葉厚朴薑汁炒茯苓各一錢半夏薑製一錢五分加川芎川歸怒動肝火加五味子柴胡薑棗煎服漏胎妊娠月水時下者皆由衝任脈虛不能約制經血血漏盡則胎斃矣有勞役喜怒不節或飲食觸冒風寒或母有宿疾為風冷所乘氣血失度而血漏下主意漏胎血少氣偏虛不能衛護熱乘之脈數黃芩加白朮安胎主藥善扶持弱脈血虛全四物艾膠制炒要知宜下陷升提分濕熱氣虛應可用參耆胎痛夫胎痛者皆妊婦禁忌不知或由生冷或觸風寒邪正相擊隨氣上下衝於心則心痛攻於腸胎則腸胎痛主意胎痛分明胎氣傷致令妊婦痛長聲脈來細緊寒食氣縮砂四氣最為良脈澀血虛宜四物紫蘇香附服安詳尺數熱痛連炒入診脈須分陰與陽四七湯蘇葉厚朴姜白茯苓各一錢半夏一錢五分薑製加薑棗水煎服惡阻皆婦人稟受怯弱或有風氣或有痰飲凡妊便是有病其婦顏色如故脈息和順但覺體肢沉重頭目昏眩擇食惡聞氣味好食酸鹹甚者作寒熱嘔吐痰水輕者不必服藥重者以半夏湯茯苓丸可也主意血奪胃氣嘔咽乾一云痰火自相搏飲食下咽隨口出致令惡阻食難吞半夏茯苓湯要藥二陳藿術亦為尊脈分熱冷並虛實順氣和脾胎自安半夏湯半夏薑製縮砂各二兩茯苓白朮炒杏仁去皮尖芍藥各五兩竹葉三十片大棗五枚陳皮五兩水煎服半夏甘而益脾辛而散滯姜所以製半夏之毒也脾喜燥而畏濕故用白朮燥脾茯苓滲濕脾喜通而惡塞故用杏仁利氣陳皮泄氣竹葉清氣能去水中之火芍藥味酸能瀉土中之水大棗取其甘而益脾耳茯苓丸赤茯人參桂心乾薑炙半夏制陳皮各一兩白朮炒乾葛枳殼甘草炙共為末蜜丸梧桐子大每服五十丸一日三服半夏茯苓湯半夏制茯苓八分砂仁炒陳皮甘草各四分加棗薑烏梅水煎服二三劑再服茯苓丸此方健脾化痰滯要藥或加白朮為好若食滯加枳殼氣惱加柴胡回春散白茯苓一錢半夏制一錢陳皮五分蒼朮厚朴各一錢薑汁炒砂仁五分藿香八分乾薑二分烏梅一個甘草三分加姜三片水煎服胎腫凡孕婦有通身腫者有腳腫者俗乎為胎腫又名胎水或脾虛不能制水者血散四肢而腫有胎挾水水血相搏者有胃虛濕者有乘風冷者有痢瘧後而腫者有飲食太過者有腹脹而腫者主意胎腫皆因濕熱多山梔卜子炒宜過研末米調稠服下管教虛腫漸消磨子煩夫妊娠而子煩者是肺臟虛熱乘於心則心煩停痰積飲在心胸之間或中於心亦煩也若熱煩者但熱而已若有痰而煩者惡聞食氣則煩燥主意妊婦心驚悶子煩病因二火君火四月相火六月在其間竹葉湯除虛燥病門冬飲子似仙丹犀角散生犀角涼心鎊地骨皮退熱麥冬清金去心赤茯苓導赤條芩瀉火甘草生用和中水煎服竹葉湯白茯二錢防風一錢麥冬一錢五分黃芩一錢五分竹葉五片水煎服門冬飲子麥冬去心人參知母各一錢生地八分茯神七分五味栝蔞仁葛根各五分甘草三分竹葉七片水煎服子癇孕婦忽然冒悶不識人事角弓反張須臾則蘇狀若中風名曰子癇亦謂之風症又名子冒四物湯養血加連芩降火四物湯方在前主意孕婦筋強語塞痰或時發搐故名癇脈浮弦滑羚羊散煎服祛風漸漸寬羚羊散羚羊角鎊獨活酸棗仁炒五加皮各八分防風川芎苡仁茯神川歸酒洗杏仁各四分去皮木香忌火甘草各三分姜三片水煎服子懸胎氣不和懷胎迫上脹滿疼痛謂之子懸恐難産主意胎氣湊上腹心田滿悶脹痛曰子懸紫蘇散子安胎氣須教一服遂安然紫蘇散紫蘇人參陳皮去白大腹皮洗淨歸尾川芎粉草白芍加姜五片蔥白七寸煎服胎前諸病俱以此加減腹痛加香附木香熱加條芩咳嗽加枳殼桑白皮嘔加砂仁瀉加白朮茯苓子淋妊婦腎虛膀胱熱也腎虛不能利水則小便數也膀胱熱則小便澀而不利妊娠之婦胞系於腎腎間虛熱而成淋疾甚者心煩悶亂名曰子淋主意子淋散在便淋中熱結便癃氣不通安榮散子功多效服之寬快有奇功安榮散麥冬通草滑石川歸燈心甘草人參細辛各五分水煎服胎死上喘因母患熱病至六七日以後臟腑極熱熏蒸其胎而致胎死自冷不能自出而作喘産母舌青者死主意脈沉病喘死胎中動熱傷胎氣上衝桂射和勻酒調下黑神散子亦能通黑神散熟地蒲黃炒黑乾薑當歸白芍酒炒桂心各三兩甘草三錢黑豆炒去皮三合半共為末每服二錢童便和酒調下它本用赤芍胎衣不下産時用力惡血上逆胎衣亦隨氣上心頭迷悶須臾不止即亡而不救矣主意胎衣不下為何如疲倦皆由用力過停風衣冷或血入胞腫令人無奈何急服奪命丹行血牛膝湯煎效更多益母童便酒調下胞衣下利更清佳奇命丹附子泡一錢丹皮一兩乾漆一錢炒煙盡為度大黃一兩共為末大黃成膏丸梧桐子大酒下五七丸牛膝湯牛膝川芎朴硝蒲黃各三兩川歸一兩四錢酒洗桂心五錢共為一劑每服五錢姜三片加生地一錢水煎又方牛膝瞿麥歸尾木通各一錢滑石二錢冬葵子酒洗一錢五分枳殼一錢水煎熱服治婦人生理不順用此滑利水道令兒易産藥分三服水二盅煎八分溫服産後寒熱凡發熱乃氣虛甚非有實熱也有內傷發熱有外感發熱惡寒者亦血氣虛甚有瘀血作者主意産後發熱又增寒中感須知有幾般外邪身熱脈浮緊五積交加病自安右寸脈大頭不痛發熱皆由宿食存香砂二陳加麥用內傷莫作外傷看小腹滿疼有瘀血增寒壯熱掌心溫弦緊脈宜五積散延胡蔥白散為尊日晡潮熱宜八物脈虛弦大補中論醫臨藥脈如臨陳虛實分明仔細參五積交加散厚朴薑汁炒陳皮桔梗蒼朮米泔水浸川芎白芷白茯川歸香附制半夏枳殼炒乾薑炙黑肉桂甘草炙麻黃白芍酒炒青皮羌活獨活柴胡前胡人參邪勝不可用參水二鍾姜三片蔥一根煎至八分溫服五積散其方見二十三內八物湯人參白朮炒茯苓甘草減半炙歸身酒洗熟地芍藥酒炒川芎各等分他本有砂仁水二盅姜三片棗一枚煎服産後血暈宜用生化湯有血多去而暈宜大補血有氣虛而暈宜大補氣有痰火泛上而暈宜清痰降火有瘀血不行而暈消瘀血為主主意血暈皆由血去多血虛痰動耳鳴鑼脈息沉微加冷厥若然不治漸成瘕産後腹痛若腹滿者當去惡血腹不滿者虛作痛也主意惡血不盡痛憂疑脈來細緊與沉遲聚寶丹磨隨飲引童便和酒最相宜脈弦而緊黑神散血利玄胡桂與歸心腹絞痛並兒枕蒲黃宜入五靈脂失笑散五靈脂蒲黃各一錢用醋水煎服聚寶丹沒藥炙去油真琥珀另研當歸酒洗焙乾研末木香各一兩乳香五錢炙去油辰砂水飛麝香各一錢另研上為末或滴為小丸或用酒糊為錠子每用一錠酒下或童便下尤妙陰戶脫氣血虛甚所以脫下但宜養血和氣自收腰肚常宜熱之主意戶物形如帕下垂俗名呼作産門頽治宜補氣兼升法清氣升時物自回用補中益氣湯十全大補中亦可
